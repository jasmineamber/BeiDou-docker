name: BeiDou Nightly Workflow

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 21 * * *'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: jasmineamber
  BACKEND_IMAGE: beidou-server
  FRONTEND_IMAGE: beidou-ui
  VERSION_PREFIX: nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  Backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with bake
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          targets: backend
          set: |
            *.cache-from=type=gha,scope=backend
            *.cache-to=type=gha,mode=max,scope=backend
          push: true
        env:
          IMAGE_TAG_BACKEND_GHCR: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ env.VERSION_PREFIX }}
          CACHEBUST: ${{ github.run_id }}

  Frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with bake
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          targets: frontend
          set: |
            *.cache-from=type=gha,scope=frontend
            *.cache-to=type=gha,mode=max,scope=frontend
          push: true
        env:
          IMAGE_TAG_FRONTEND_GHCR: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ env.VERSION_PREFIX }}
          CACHEBUST: ${{ github.run_id }}