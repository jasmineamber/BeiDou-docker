name: BeiDou Release Workflow

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "no prefix release version"
        required: true
        type: string
    
env:
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: beidoums
  RELEASE_IMAGE: beidou-server-all


permissions:
  contents: read
  packages: write
  id-token: write
# attestations: write

jobs:
  Backend:
    runs-on: ubuntu-latest
    # strategy:
    #   fail-fast: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with bake
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          targets: release
          set: |
            *.cache-from=type=gha,scope=release
            *.cache-to=type=gha,mode=max,scope=release
          push: true
          no-cache: true
        env:
          IMAGE_TAG_RELEASE_GHCR: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ env.RELEASE_IMAGE }}:v${{ inputs.release_version }}
          ARG_RELEASE_VERSION: ${{ inputs.release_version }}